[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.pdo", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev", "npm install"]

[phases.build]
cmds = [
    "cp .env.production .env",
    "npm run build",
    "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache",
    "mkdir -p storage/app/public",
    "mkdir -p storage/statamic",
    "chmod -R 777 storage",
    "chmod -R 777 bootstrap/cache",
    "chmod +x railway-start.sh",
    "touch database/database.sqlite",
    "php artisan migrate --force",
    "php artisan storage:link",
    "cd vendor/statamic/cms && npm install && npm run build && cd /app",
    "php artisan statamic:install",
    "php artisan statamic:stache:warm",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "chmod +x railway-start.sh && ./railway-start.sh"
