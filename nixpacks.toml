[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.pdo", "php84Extensions.fileinfo", "php84Extensions.exif", "php84Extensions.openssl", "php84Packages.composer", "nodejs_22", "nginx"]

[phases.install]
cmds = ["rm -f package-lock.json", "composer install --optimize-autoloader --no-dev", "npm install"]

[phases.build]
cmds = [
    "npm run build",
    "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache",
    "mkdir -p public/img",
    "chmod -R a+rw storage public/img",
    "touch database/database.sqlite",
    "php artisan migrate --force",
    "php artisan storage:link",
    "cd vendor/statamic/cms && npm install && npm run build && cd /app",
    "php artisan statamic:install",
    "php artisan statamic:assets:generate-presets",
    "php artisan statamic:stache:clear",
    "php artisan cache:clear",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "mkdir -p storage/app/glide_cache storage/statamic/glide storage/framework/cache && chmod -R a+rw storage && php artisan statamic:stache:warm && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
