[build]
builder = "nixpacks"
buildCommand = "curl -sS https://getcomposer.org/installer | php && mv composer.phar /usr/local/bin/composer && composer install --optimize-autoloader --no-dev && npm install && npm run production && mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache && chmod -R a+rw storage && touch database/database.sqlite && php artisan migrate --force && php artisan storage:link && cd vendor/statamic/cms && npm install && npm run build && cd /app && php artisan statamic:install && php artisan config:cache && php artisan route:cache && php artisan view:cache"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
healthcheckPath = "/"
