server {
    listen ${PORT:-8000};
    server_name _;
    root /app/public;
    index index.php;

    client_max_body_size 50M;

    # Handle Glide image manipulation routes
    location ~ ^/img/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle CP thumbnails
    location ~ ^/cp/thumbnails/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Assets should be served directly if they exist
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
