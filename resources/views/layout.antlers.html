<!doctype html>
<html lang="{{ $site:short_locale }}">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ $title }} — {{ $settings:site_name }}</title>
        <meta name="description" content="{{ $intro | strip_tags | entities }}">
        <script type="application/ld+json">
            {
              "@context": "https://schema.org/",
              "@type": "blogPost",
              "name": "{{ $title }}",
              "author": {
                "@type": "Person",
                "name": "{{ $author:name }}"
              },
              "datePublished": "{{ $date | format("Y-m-d") }}",
              "description": "{{ $intro | strip_tags | entities }}"
            }
        </script>
        <link rel="stylesheet" href="{{ mix src='css/tailwind.css' }}">
        {{ partial:personality }}
        

        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-0W6E5DNXN3"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-0W6E5DNXN3');
        </script>
        
        <!-- <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.min.js" defer></script>
        <script src="{{ mix src='/js/site.js' }}"></!----   > -->
        {{ vite src="resources/css/tailwind.css|resources/js/site.js" preload }}
    </head>
    <body class="bg-[#11131C] text-white font-body leading-normal personality-{{ $settings:personality }}">
        {{ partial:nav }}
        <main class="py-12 lg:py-20">
            {{ $template_content }}
        </main>
        {{ partial:footer }}
        {{ partial:extras }}
    </body>
</html>
