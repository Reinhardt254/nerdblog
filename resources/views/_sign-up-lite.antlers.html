<aside class="text-center py-6 max-w-3xl mx-auto">
    <div class="w-full border-t-2 mb-8 border-black squiggle"></div>
    <!--<h3 class="font-display text-4xl uppercase font-bold leading-none">Sign up for our newsletter</h3>-->
    <!--<p class="text-lg mt-8">Join our newsletter and get resources, curated content, and design inspiration delivered straight to your inbox.</p>-->

    {{# This is a static form you can wire up to anything. #}}
    
    {{ nocache }}
    {{ form:newsletter_signup }}

  
    <div class="mt-4 flex flex-wrap items-center md:w-2/3 mx-auto">
         
        {{ if success }}
            <div class="bg-green-300 text-white p-2">
                {{ success }}
            </div>
        {{ else }}
         
            {{ if errors }}
            <div class="bg-red-300 text-white p-2">
                {{ errors }}
                    {{ value }}<br>
                {{ /errors }}
            </div>
            {{ /if }}
            
            <input id="email" name="email" class="w-full flex-1 bg-gray-200 py-3 px-6 rounded" type="email" placeholder="Your email" required>
            <input type="text" class="hidden" name="{{ honeypot ?? 'honeypot' }}">
            <button type="submit" class=" md:ml-3 mt-3 md:mt-0 w-full md:w-auto text-white py-3 px-6 rounded hover:squiggle" style="background-color:#2f80ed">Subscribe</button>
            
            <label class="mt-4 text-left">
            <input type="checkbox" name="optin" required>
            <span class="font-light">I agree to receive your newsletters and accept the data privacy statement.</span>
            </label>


            
        {{ /if }}
    
    </div>
    {{ /form:newsletter_signup }}
    {{ /nocache }}
    
    <!--<form action="" class="mt-8 flex flex-wrap items-center md:w-2/3 mx-auto">-->
    <!--    <label for="email" class="sr-only"></label>-->
    <!--    <input id="email" class="w-full flex-1 bg-gray-200 py-3 px-6 rounded" type="email" placeholder="Your email" required>-->
    <!--    <button class="bg-black md:ml-3 mt-3 md:mt-0 w-full md:w-auto text-white py-3 px-6 rounded hover:squiggle" type="submit">Subscribe</button>-->
    <!--</form>-->

    <div class="w-full border-b-2 pt-12 border-black squiggle"></div>
</aside>
