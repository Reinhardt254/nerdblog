{{ items }}
<a href="{{ url }}" class="flex flex-col overflow-hidden transition-all bg-white border border-gray-200 group sm:flex-row rounded-2xl hover:shadow-lg hover:border-blue-200">
    <div class="relative sm:w-72 shrink-0">
        {{ if hero_image }}
            <!-- <img src="{{ glide:hero_image width="640" height="400" fit="crop_focal" }}" alt="{{ hero_image:alt ?? title }}" class="w-full h-48 sm:h-full sm:min-h-[160px] object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy"> -->

            <img src="{{ hero_image }}" alt="{{ hero_image:alt ?? title }}" class="w-full h-48 sm:h-full sm:min-h-[160px] object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
        {{ else }}
            <div class="w-full h-48 sm:min-h-[160px] bg-gradient-to-br from-gray-100 to-gray-200"></div>
        {{ /if }}
    </div>
    <div class="flex flex-col justify-center flex-1 p-5 sm:p-6">
        <h3 class="text-lg font-semibold text-gray-900 transition-colors sm:text-xl group-hover:text-blue-600">{{ title }}</h3>
        <p class="mt-2 text-sm text-gray-600 line-clamp-2">{{ excerpt ?? intro | strip_tags | truncate:160 }}</p>
        <div class="flex items-center gap-3 mt-4 text-xs text-gray-500">
            <time datetime="{{ date format='Y-m-d' }}">{{ date }}</time>
            {{ if author }}<span>{{ author:name }}</span>{{ /if }}
        </div>
    </div>
</a>
{{ /items }}
