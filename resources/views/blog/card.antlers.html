<a href="{{ url }}" class="flex flex-col h-full overflow-hidden transition-all bg-white border border-gray-200 group rounded-2xl hover:shadow-xl hover:border-blue-200">
    <div class="relative overflow-hidden aspect-[16/10]">
        {{ if hero_image }}
            <img src="{{ glide:hero_image width="736" height="460" fit="crop_focal" }}" alt="{{ hero_image:alt ?? title }}" class="object-cover w-full h-full transition-transform duration-500 group-hover:scale-105" loading="lazy">
        {{ else }}
            <div class="w-full h-full bg-gradient-to-br from-gray-100 to-gray-200"></div>
        {{ /if }}
        {{ if categories }}
            <span class="absolute top-3 left-3 px-2.5 py-1 rounded-full text-xs font-medium bg-white/95 text-gray-900 border border-gray-100 shadow-sm">{{ categories:title }}</span>
        {{ /if }}
    </div>
    <div class="flex flex-col flex-1 p-5">
        <div class="flex items-center gap-2 mb-2 text-xs text-gray-500">
            <time datetime="{{ date format='Y-m-d' }}">{{ date }}</time>
            {{ if main_content }}
                <span>·</span>
                <span>{{ main_content | read_time(180) }} min read</span>
            {{ /if }}
        </div> 
        <h3 class="text-lg font-semibold text-gray-900 transition-colors group-hover:text-blue-600 line-clamp-2">{{ title }}</h3>
        <p class="flex-1 mt-2 text-sm text-gray-600 line-clamp-3">{{ excerpt ?? intro | strip_tags | truncate:140 }}</p>
        <div class="flex items-center gap-2 pt-4 mt-auto border-t border-gray-100">
            {{ if author }}
                <img src="{{ author:avatar ?? author:email | gravatar(64) }}" alt="" class="w-8 h-8 rounded-full" loading="lazy">
                <span class="text-sm font-medium text-gray-800 truncate">{{ author:name }}</span>
            {{ /if }}
        </div>
    </div>
</a>
