sections:
  main:
    display: Main
    fields:
      -
        handle: name
        field:
          type: text
          display: Name
      -
        handle: handle
        field:
          generate: true
          type: slug
          instructions: 'Shown in the URL for author pages. E.g. `/author/kevin-jones`'
          listable: hidden
          display: Handle
      -
        handle: email
        field:
          type: text
          input: email
          display: 'Email Address'
      -
        handle: roles
        field:
          type: user_roles
          width: 50
      -
        handle: groups
        field:
          type: user_groups
          width: 50
      -
        handle: avatar
        field:
          type: assets
          max_files: 1
          container: assets
      -
        handle: bio
        field:
          type: textarea
          display: Bio
          instructions: 'Shown in the “About the author” box on blog posts.'
      -
        handle: twitter
        field:
          type: text
          input: url
          display: Twitter / X profile URL
          instructions: 'Optional link for “Follow on Twitter” on blog posts.'
